version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: rabotyaga-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: rabotyaga
      POSTGRES_USER: rabotyaga
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme123}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - /root/rabotyaga/frontend/dist:/app/frontend/dist
      - postgres_data:/var/lib/postgresql/data
      - ./db:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rabotyaga"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabotyaga-bot:
    build: .
    container_name: rabotyaga-bot
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3001:3001"
    volumes:
      - /root/rabotyaga/frontend/dist:/app/frontend/dist
      - ./.env:/app/.env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://rabotyaga:${DB_PASSWORD:-changeme123}@postgres:5432/rabotyaga
    networks:
      - rabotyaga-network

volumes:
      - /root/rabotyaga/frontend/dist:/app/frontend/dist
  postgres_data:

networks:
  rabotyaga-network:
    driver: bridge
