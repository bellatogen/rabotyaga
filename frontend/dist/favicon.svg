<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Голова -->
  <circle cx="50" cy="40" r="25" fill="#F5E6D3" stroke="#8B6F47" stroke-width="2"/>
  
  <!-- Волосы -->
  <path d="M25 35 Q30 20 50 18 Q70 20 75 35 Q78 30 75 25 Q70 10 50 12 Q30 10 25 25 Q22 30 25 35" 
        fill="#8B6F47"/>
  
  <!-- Глаза (весёлые, с искорками) -->
  <circle cx="42" cy="38" r="4" fill="white" stroke="#333" stroke-width="1.5"/>
  <circle cx="43" cy="37" r="2" fill="#333"/>
  <circle cx="44" cy="36" r="1" fill="white"/>
  
  <circle cx="58" cy="38" r="4" fill="white" stroke="#333" stroke-width="1.5"/>
  <circle cx="59" cy="37" r="2" fill="#333"/>
  <circle cx="60" cy="36" r="1" fill="white"/>
  
  <!-- Брови (приподнятые, удивлённые) -->
  <path d="M38 32 Q42 30 46 32" fill="none" stroke="#8B6F47" stroke-width="2" stroke-linecap="round"/>
  <path d="M54 32 Q58 30 62 32" fill="none" stroke="#8B6F47" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Нос (курносый) -->
  <path d="M50 42 Q48 46 50 48 Q52 46 50 42" fill="#E8C4A8" stroke="#C9A88A" stroke-width="1"/>
  
  <!-- Рот (широкая улыбка с зубами) -->
  <path d="M40 52 Q50 62 60 52" fill="white" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M42 52 L44 56 M46 53 L48 57 M50 53 L52 57 M54 53 L56 57 M58 52 L60 56" 
        stroke="#DDD" stroke-width="1" stroke-linecap="round"/>
  
  <!-- Щёки (румянец) -->
  <ellipse cx="35" cy="46" rx="4" ry="3" fill="#FFB6C1" opacity="0.6"/>
  <ellipse cx="65" cy="46" rx="4" ry="3" fill="#FFB6C1" opacity="0.6"/>
  
  <!-- Тело (плечи бармена) -->
  <path d="M25 65 Q50 90 75 65 L75 70 Q50 95 25 70 Z" fill="#5B8B9B"/>
  
  <!-- Фартук -->
  <rect x="40" y="65" width="20" height="25" fill="#F5E6D3" stroke="#8B6F47" stroke-width="1.5" rx="2"/>
  
  <!-- Руки (подняты вверх, как на фото) -->
  <path d="M25 68 Q20 60 25 55" fill="none" stroke="#F5E6D3" stroke-width="6" stroke-linecap="round"/>
  <path d="M75 68 Q80 60 75 55" fill="none" stroke="#F5E6D3" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Кепка бармена -->
  <ellipse cx="50" cy="18" rx="22" ry="6" fill="#5B8B9B" stroke="#3D5F6F" stroke-width="1.5"/>
  <rect x="28" y="12" width="44" height="8" fill="#5B8B9B" stroke="#3D5F6F" stroke-width="1.5" rx="2"/>
  <text x="50" y="18" text-anchor="middle" font-size="6" fill="white" font-weight="bold">БАР</text>
</svg>
